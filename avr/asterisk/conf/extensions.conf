; ============================================
; AVR AudioSocket subroutine
; ============================================

[avr]
exten => s,1,Answer()
 same => n,Ringing()
 same => n,Wait(1)
 same => n,Set(UUID=${SHELL(uuidgen | tr -d '\n')})
 same => n,Set(DENOISE(rx)=on)
 same => n,Set(JITTERBUFFER(adaptive)=default)
 same => n,Dial(AudioSocket/${ARG1}/${UUID})
 same => n,Hangup()

; ============================================
; Incoming calls from SIP trunk
; Route to AVR voice agent
; ============================================

[from-trunk]
; Match the DID number — route to avr-core
exten => 02014101241,1,NoOp(Incoming call from trunk to ${EXTEN})
 same => n,GoSub(avr,s,1(avr-core:5001))

; Catch-all for any other incoming number format
exten => _X.,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(num)})
 same => n,GoSub(avr,s,1(avr-core:5001))

; ============================================
; Incoming GSM calls from GoIP gateway (Line 7)
; ============================================

[from-goip]
exten => _X.,1,NoOp(Incoming GSM call from GoIP: ${CALLERID(num)} to ${EXTEN})
 same => n,GoSub(avr,s,1(avr-core:5001))

exten => s,1,NoOp(Incoming GSM call from GoIP: ${CALLERID(num)})
 same => n,GoSub(avr,s,1(avr-core:5001))

; ============================================
; Local testing extensions
; ============================================

[demo]
exten => 5001,1,GoSub(avr,s,1(avr-core:5001))

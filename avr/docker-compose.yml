services:
  avr-core:
    image: agentvoiceresponse/avr-core
    platform: linux/x86_64
    container_name: avr-core
    restart: always
    environment:
      - PORT=5001
      - ASR_URL=http://avr-asr-deepgram:6010/speech-to-text-stream
      - LLM_URL=http://avr-llm-anthropic:6014/prompt-stream
      - TTS_URL=http://avr-tts-elevenlabs:6007/text-to-speech-stream
      - INTERRUPT_LISTENING=true
      - SYSTEM_MESSAGE=Welcome to Ur' Shawarma Express! How can I help you today?
    ports:
      - 5001:5001
    networks:
      - avr

  avr-asr-deepgram:
    image: agentvoiceresponse/avr-asr-deepgram
    platform: linux/x86_64
    container_name: avr-asr-deepgram
    restart: always
    environment:
      - PORT=6010
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - SPEECH_RECOGNITION_LANGUAGE=en
      - SPEECH_RECOGNITION_MODEL=nova-2-phonecall
    networks:
      - avr

  avr-tts-elevenlabs:
    image: agentvoiceresponse/avr-tts-elevenlabs
    platform: linux/x86_64
    container_name: avr-tts-elevenlabs
    restart: always
    environment:
      - PORT=6007
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
    networks:
      - avr

  avr-llm-anthropic:
    image: agentvoiceresponse/avr-llm-anthropic
    platform: linux/x86_64
    container_name: avr-llm-anthropic
    restart: always
    environment:
      - PORT=6014
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - ANTHROPIC_MAX_TOKENS=${ANTHROPIC_MAX_TOKENS:-512}
      - ANTHROPIC_TEMPERATURE=${ANTHROPIC_TEMPERATURE:-0.7}
      - ANTHROPIC_SYSTEM_PROMPT=${ANTHROPIC_SYSTEM_PROMPT}
      - AMI_URL=http://avr-ami:6006
      # Env vars for custom tools (menu, orders, escalation)
      - API_URL=http://159.65.83.92:3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - BAILEYS_URL=http://159.65.83.92:3001
      - BAILEYS_SECRET=${BAILEYS_SECRET}
    volumes:
      - ./tools:/usr/src/app/tools
    networks:
      - avr

  avr-asterisk:
    image: agentvoiceresponse/avr-asterisk
    platform: linux/x86_64
    container_name: avr-asterisk
    restart: always
    ports:
      - 5038:5038
      - 5060:5060/udp
      - 5060:5060/tcp
      - 8088:8088
      - 8089:8089
      - 10000-10050:10000-10050/udp
    volumes:
      - ./asterisk/conf/manager.conf:/etc/asterisk/my_manager.conf
      - ./asterisk/conf/pjsip.conf:/etc/asterisk/my_pjsip.conf
      - ./asterisk/conf/extensions.conf:/etc/asterisk/my_extensions.conf
    networks:
      - avr

  avr-ami:
    image: agentvoiceresponse/avr-ami
    platform: linux/x86_64
    container_name: avr-ami
    restart: always
    environment:
      - PORT=6006
      - AMI_HOST=avr-asterisk
      - AMI_PORT=5038
      - AMI_USERNAME=avr
      - AMI_PASSWORD=avr
    networks:
      - avr

networks:
  avr:
    name: avr
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
